version: 2

builds:
  - id: whooing
    binary: whooing
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X whooing-cli/config.AppID={{.Env.WHOOING_APP_ID}}
      - -X whooing-cli/config.AppSecret={{.Env.WHOOING_APP_SECRET}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "whoo-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: chorr
    name: whoo-cli

changelog:
  sort: asc
