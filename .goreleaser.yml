version: 2

builds:
  - id: whoo
    binary: whoo
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X whoo-cli/config.AppID={{.Env.WHOOING_APP_ID}}
      - -X whoo-cli/config.AppSecret={{.Env.WHOOING_APP_SECRET}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "whoo-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: chorr
    name: whoo-cli
  # 워크플로 재실행 시 기존 에셋(422 already_exists)을 삭제 후 재업로드
  replace_existing_artifacts: true

changelog:
  sort: asc
